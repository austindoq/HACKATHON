<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sortable Categories</title>

    <!-- SortableJS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script type="module" src="getUserOrderRef.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
        background: #f5f5f5;
      }

      h2 {
        margin-bottom: 15px;
      }

      #categoryList {
        list-style: none;
        padding: 0;
        max-width: 400px;
      }

      #categoryList li {
        background: white;
        border: 1px solid #ccc;
        padding: 12px;
        margin-bottom: 8px;
        border-radius: 6px;
        cursor: grab;
      }

      button {
        margin-top: 15px;
        padding: 10px 15px;
        border: none;
        background: #0f766e;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }

      #output {
        margin-top: 20px;
        background: white;
        border: 1px solid #ddd;
        padding: 12px;
        white-space: pre;
      }
    </style>
  </head>

  <body>
    <h2>Drag to reorder categories</h2>

    <ul id="categoryList"></ul>

    <button id="submitBtn">Submit Order</button>

    <div id="output"></div>
  </body>


</html>
