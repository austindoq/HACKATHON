<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Class Sorter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <nav class="bg-slate-800 border-black border-b-2 text-gray-200">
      <h1 class="text-5xl">TAILWIND CLASS SORTER 3000</h1>
    </nav>
    <main class="h-screen m-auto bg-gray-200 flex justify-center p-3">
      <div
        class="border-4 rounded-lg shadow-2xl border-black max-w-4xl h-1/4 flex flex-col gap-5 items-center justify-center"
      >
        <h1 class="text-3xl">Upload your HTML here!</h1>
        <form class="">
          <div class="bg-white rounded-md w-fit border border-black p-2">
            <label for="userFileInput">Upload your HTML</label>
            <input
              type="file"
              id="userFileInput"
              name="userFileInput"
              placeholder="FILE HERE"
              class="hidden"
            />
          </div>
        </form>
      </div>
      <div></div>
    </main>
    <footer class="bg-slate-800 text-gray-200">
      <div><h1 class="text-2xl">TEAM BLACK FANG</h1></div>
    </footer>
    <script src="./fileParser.js"></script>
  </body>
</html>
